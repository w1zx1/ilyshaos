---
title: Aggressive Telemetry Removal
description: Removes and disables all remaining telemetry services and components
actions:
  # Disable DiagTrack
  - !service: {name: 'DiagTrack', operation: disable, ignoreErrors: true}  # Diagnostic Tracking Service
  - !service: {name: 'dmwappushservice', operation: disable, ignoreErrors: true}  # Device Management Wireless Application Protocol
  
  # Disable Connected User Experiences and Telemetry
  - !service: {name: 'ConnectedUserExperienceAndTelemetry', operation: disable, ignoreErrors: true}
  
  # Disable OneSync
  - !service: {name: 'OneSyncSvc', operation: disable, ignoreErrors: true}
  
  # Disable Activity History
  - !service: {name: 'ActivityHistoryService', operation: disable, ignoreErrors: true}
  
  # Disable Remote Telemetry
  - !registryValue: {path: 'HKCU\SOFTWARE\Policies\Microsoft\Windows\AppPrivacy', value: 'LetAppsAccessDiagnostics', data: '2', type: REG_DWORD, ignoreErrors: true}
  
  # Disable Error Reporting
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Services\wercplsupport', value: 'Start', data: '4', type: REG_DWORD, ignoreErrors: true}

  # Disable Microsoft telemetry endpoints
  - !registryValue: {path: 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\DataCollection', value: 'AllowDiagnosticData', data: '0', type: REG_DWORD}

  # Disable telemetry scheduled tasks
  - !scheduledTask: {path: '\Microsoft\Windows\Application Experience\Microsoft Compatibility Appraiser', operation: disable, ignoreErrors: true}
  - !scheduledTask: {path: '\Microsoft\Windows\Application Experience\AitProgRunner', operation: disable, ignoreErrors: true}
  - !scheduledTask: {path: '\Microsoft\Windows\DiskDiagnostic\Microsoft-Windows-DiskDiagnosticDataCollector', operation: disable, ignoreErrors: true}
  - !scheduledTask: {path: '\Microsoft\Windows\Autochk\Proxy', operation: disable, ignoreErrors: true}
  - !scheduledTask: {path: '\Microsoft\Windows\Customer Experience Improvement Program\Consolidator', operation: disable, ignoreErrors: true}
