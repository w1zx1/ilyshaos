---
title: Disable Superfetch (Prefetcher)
description: Disables Superfetch and Prefetch to reduce memory usage and I/O operations

actions:
  # Disable Superfetch (PrefetchType = 0)
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management\PrefetchParameters', value: 'EnablePrefetcher', data: '0', type: REG_DWORD}

  # Disable Boot Prefetch
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management\PrefetchParameters', value: 'EnableBootTrace', data: '0', type: REG_DWORD}
  
  # Disable Superfetch service
  - !service: {name: 'SysMain', operation: disable, ignoreErrors: true}
