---
title: Aggressive Service Disabling
description: Disables many non-essential services to free up resources and improve boot time

actions:
  # Storage services
  - !service
    name: "StorSvc"
    operation: disable
    ignoreErrors: true

  - !service
    name: "DiskDefragmenter"
    operation: disable
    ignoreErrors: true

  - !service
    name: "defragsvc"
    operation: disable
    ignoreErrors: true

  # Update services  
  - !service
    name: "UsoSvc"
    operation: disable
    ignoreErrors: true

  - !service
    name: "BITS"
    operation: disable
    ignoreErrors: true

  # Remote services
  - !service
    name: "RpcSs"
    operation: disable
    ignoreErrors: true

  - !service
    name: "RemoteRegistry"
    operation: disable
    ignoreErrors: true

  # Wireless services
  - !service
    name: "WlanSvc"
    operation: disable
    ignoreErrors: true

  - !service
    name: "WwanSvc"
    operation: disable
    ignoreErrors: true

  # Bluetooth
  - !service
    name: "bthserv"
    operation: disable
    ignoreErrors: true

  # Audio (caution: may break sound)
  - !service
    name: "AudioEndpointBuilder"
    operation: disable
    ignoreErrors: true

  - !service
    name: "Audiosrv"
    operation: disable
    ignoreErrors: true

  # Print services
  - !service
    name: "spooler"
    operation: disable
    ignoreErrors: true

  - !service
    name: "PrintNotify"
    operation: disable
    ignoreErrors: true

  # Scanner
  - !service
    name: "WiaRpc"
    operation: disable
    ignoreErrors: true

  # Sensor services
  - !service
    name: "SensrSvc"
    operation: disable
    ignoreErrors: true

  - !service
    name: "SensorDataService"
    operation: disable
    ignoreErrors: true

  # Other
  - !service
    name: "lmhosts"
    operation: disable
    ignoreErrors: true