---
title: Aggressive Service Disabling
description: Disables many non-essential services to free up resources and improve boot time

actions:
  # Storage services
  - !service: {name: 'StorSvc', operation: change, startup: 4, ignoreErrors: true}
  - !service: {name: 'DiskDefragmenter', operation: change, startup: 4, ignoreErrors: true}
  - !service: {name: 'defragsvc', operation: change, startup: 4, ignoreErrors: true}
  # Update services  
  - !service: {name: 'UsoSvc', operation: change, startup: 4, ignoreErrors: true}
  - !service: {name: 'BITS', operation: change, startup: 4, ignoreErrors: true}
  # Remote services
  - !service: {name: 'RpcSs', operation: change, startup: 4, ignoreErrors: true}
  - !service: {name: 'RemoteRegistry', operation: change, startup: 4, ignoreErrors: true}
  # Wireless services
  - !service: {name: 'WlanSvc', operation: change, startup: 4, ignoreErrors: true}
  - !service: {name: 'WwanSvc', operation: change, startup: 4, ignoreErrors: true}
  # Bluetooth
  - !service: {name: 'bthserv', operation: change, startup: 4, ignoreErrors: true}
  # Audio (caution: may break sound)
  - !service: {name: 'AudioEndpointBuilder', operation: change, startup: 4, ignoreErrors: true}
  - !service: {name: 'Audiosrv', operation: change, startup: 4, ignoreErrors: true}
  # Print services
  - !service: {name: 'spooler', operation: change, startup: 4, ignoreErrors: true}
  - !service: {name: 'PrintNotify', operation: change, startup: 4, ignoreErrors: true}
  # Scanner
  - !service: {name: 'WiaRpc', operation: change, startup: 4, ignoreErrors: true}
  # Sensor services
  - !service: {name: 'SensrSvc', operation: change, startup: 4, ignoreErrors: true}
  - !service: {name: 'SensorDataService', operation: change, startup: 4, ignoreErrors: true}
  # Other
  - !service: {name: 'lmhosts', operation: change, startup: 4, ignoreErrors: true}
